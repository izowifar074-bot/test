name: Assemble uploaded log

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Recover overlap, rebuild, and verify
        shell: bash
        run: |
          set -u
          exec > >(tee assembly-run.log) 2>&1

          mapfile -d '' B64_FILES < <(find .upload_tmp -maxdepth 1 -type f -name 'launch_log.xz.b64.*' -print0 | sort -zV)
          mapfile -d '' HEX_FILES < <(find .upload_tmp -maxdepth 1 -type f -name 'launch_log.rest.hex.*' -print0 | sort -zV)

          cat "${B64_FILES[@]}" > /tmp/prefix.b64
          cat "${HEX_FILES[@]}" | xxd -r -p > /tmp/suffix.b64

          prefix_size=$(wc -c < /tmp/prefix.b64)
          suffix_size=$(wc -c < /tmp/suffix.b64)
          expected_total=53680
          expected_hash='2dc3acde4b609e86de8fb4ce139b434cd0db1edf3f7dd3a951b84053ad4b21d1'

          echo "prefix_size=$prefix_size"
          echo "suffix_size=$suffix_size"
          echo "expected_total=$expected_total"

          try_offset() {
            local off="$1"
            (( off >= 0 && off <= suffix_size )) || return 1
            cat /tmp/prefix.b64 > /tmp/candidate.b64
            tail -c +$((off + 1)) /tmp/suffix.b64 >> /tmp/candidate.b64
            base64 --decode /tmp/candidate.b64 > /tmp/candidate.xz 2>/dev/null || return 1
            xz --decompress --stdout /tmp/candidate.xz > Launch-2026-7-10-194208635.log 2>/dev/null || return 1
            [[ "$(sha256sum Launch-2026-7-10-194208635.log | cut -d' ' -f1)" == "$expected_hash" ]]
          }

          found=0
          inferred_offset=$((prefix_size + suffix_size - expected_total))
          echo "Trying inferred overlap offset: $inferred_offset"
          if try_offset "$inferred_offset"; then
            found=1
            winning_offset="$inferred_offset"
          else
            echo 'Inferred offset failed; scanning all base64-aligned offsets.'
            for ((off=0; off<=suffix_size; off+=4)); do
              if try_offset "$off"; then
                found=1
                winning_offset="$off"
                break
              fi
            done
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ((found)); then
            echo "Recovered successfully with overlap offset $winning_offset"
            wc -c Launch-2026-7-10-194208635.log
            sha256sum Launch-2026-7-10-194208635.log
            rm -rf .upload_tmp
            rm -f assembly-run.log
            rm -f .github/workflows/assemble-upload.yml
            rmdir .github/workflows 2>/dev/null || true
            rmdir .github 2>/dev/null || true
            git add -A
            git commit -m "Add Launch-2026-7-10-194208635.log"
            git push origin main
          else
            echo 'No valid overlap offset found.'
            git add assembly-run.log
            git commit -m "Update log assembly diagnostics" || true
            git push origin main
            exit 1
          fi
