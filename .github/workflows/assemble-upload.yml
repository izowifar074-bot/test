name: Assemble uploaded log

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/assemble-upload.yml'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild and verify file
        shell: bash
        run: |
          set -euo pipefail
          cat .upload_tmp/launch_log.xz.b64.* > /tmp/launch-log.b64
          cat .upload_tmp/launch_log.rest.hex.* | xxd -r -p >> /tmp/launch-log.b64
          base64 --decode /tmp/launch-log.b64 > /tmp/launch-log.xz
          xz --decompress --stdout /tmp/launch-log.xz > Launch-2026-7-10-194208635.log
          echo "2dc3acde4b609e86de8fb4ce139b434cd0db1edf3f7dd3a951b84053ad4b21d1  Launch-2026-7-10-194208635.log" | sha256sum --check

          rm -rf .upload_tmp
          rm -f .github/workflows/assemble-upload.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Launch-2026-7-10-194208635.log"
          git push

# retrigger
